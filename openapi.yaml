components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    MaTruongCode:
      name: maTruongCode
      in: path
      required: true
      schema:
        type: string
      description: School code
  responses:
    ValidationError:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: Invalid request data
              details:
                - path: body.email
                  message: Invalid email address
    UnauthorizedError:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Unauthorized
    AccountLockedError:
      description: Account locked
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: ACCOUNT_LOCKED
              message: Account is locked
    ForbiddenError:
      description: Not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: FORBIDDEN
              message: Forbidden
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Resource not found
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: CONFLICT
              message: Resource already exists
  schemas:
    ApiSuccess:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          nullable: true
    ApiErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccess'
        - type: object
          properties:
            data:
              type: object
              required: [status, database]
              properties:
                status:
                  type: string
                  example: ok
                database:
                  type: string
                  example: reachable
    Role:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
    PublicUser:
      type: object
      required: [id, email, fullName, phoneNumber, avatarUrl, status, role, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        phoneNumber:
          oneOf:
            - type: string
            - type: 'null'
        avatarUrl:
          oneOf:
            - type: string
              format: uri
            - type: 'null'
        status:
          type: string
          enum: [HOAT_DONG, BI_KHOA, CHUA_XAC_THUC, CHO_DOI_MAT_KHAU]
        role:
          $ref: '#/components/schemas/Role'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        fcmToken:
          type: string
        deviceType:
          type: string
    RegisterStudentRequest:
      type: object
      required: [email, password, fullName, maSinhVien]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        fullName:
          type: string
        maSinhVien:
          type: string
        phoneNumber:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        maTruong:
          type: integer
          nullable: true
        maTruongCode:
          type: string
          nullable: true
        nganhHoc:
          type: string
          nullable: true
        khoaHoc:
          type: string
          nullable: true
    StudentProfile:
      type: object
      required: [maNguoiDung, maSinhVien, maTruong, maTruongCode, nganhHoc, khoaHoc]
      properties:
        maNguoiDung:
          type: string
        maSinhVien:
          type: string
        maTruong:
          type: integer
          nullable: true
        maTruongCode:
          type: string
          nullable: true
        nganhHoc:
          type: string
          nullable: true
        khoaHoc:
          type: string
          nullable: true
    GoogleLoginRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
        fcmToken:
          type: string
        deviceType:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
        fcmToken:
          type: string
        deviceType:
          type: string
    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccess'
        - type: object
          properties:
            data:
              type: object
              required: [user, accessToken, refreshToken, refreshTokenExpiresAt]
              properties:
                user:
                  $ref: '#/components/schemas/PublicUser'
                accessToken:
                  type: string
                refreshToken:
                  type: string
                refreshTokenExpiresAt:
                  type: string
                  format: date-time
    RegisterStudentResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccess'
        - type: object
          properties:
            data:
              type: object
              required: [message, user, studentProfile]
              properties:
                message:
                  type: string
                user:
                  $ref: '#/components/schemas/PublicUser'
                studentProfile:
                  $ref: '#/components/schemas/StudentProfile'
    RefreshTokenResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccess'
        - type: object
          properties:
            data:
              type: object
              required: [accessToken, refreshToken, refreshTokenExpiresAt]
              properties:
                accessToken:
                  type: string
                refreshToken:
                  type: string
                refreshTokenExpiresAt:
                  type: string
                  format: date-time
    LoggedOutResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccess'
