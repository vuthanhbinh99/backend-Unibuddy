components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    MaTruongCode:
      name: maTruongCode
      in: path
      required: true
      schema:
        type: string
      description: School code
  responses:
    ValidationError:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: Invalid request data
              details:
                - path: body.email
                  message: Invalid email address
    UnauthorizedError:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Unauthorized
    AccountLockedError:
      description: Account locked
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: ACCOUNT_LOCKED
              message: Account is locked
    ForbiddenError:
      description: Not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: FORBIDDEN
              message: Forbidden
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Resource not found
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error:
              code: CONFLICT
              message: Resource already exists
  schemas:
    ApiSuccess:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          nullable: true
    ApiErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccess'
        - type: object
          properties:
            data:
              type: object
              required: [status, database]
              properties:
                status:
                  type: string
                  example: ok
                database:
                  type: string
                  example: reachable
    Role:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
    PublicUser:
      type: object
      required: [id, email, fullName, phoneNumber, avatarUrl, status, role, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        phoneNumber:
          oneOf:
            - type: string
            - type: 'null'
        avatarUrl:
          oneOf:
            - type: string
              format: uri
            - type: 'null'
        status:
          type: string
          enum: [HOAT_DONG, BI_KHOA, CHUA_XAC_THUC]
        role:
          $ref: '#/components/schemas/Role'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        fcmToken:
          type: string
        deviceType:
          type: string
    GoogleLoginRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
        fcmToken:
          type: string
        deviceType:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
        fcmToken:
          type: string
        deviceType:
          type: string
    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
